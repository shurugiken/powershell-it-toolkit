name: CI
on: [push, pull_request]
jobs:
  parse:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $errs = @()
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $e = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$e) | Out-Null
            if ($e) { $errs += $e }
          }
          if ($errs.Count) { $errs; exit 1 } else { "All scripts parse cleanly." }

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config
